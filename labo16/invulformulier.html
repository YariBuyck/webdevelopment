<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Invulformulier</title>
    <link href="styles/invulformulier.css" rel="stylesheet">
</head>
<body>

<form>

    <div class="persoonlijke_informatie">
        <p>Persoonlijke informatie</p>

        <label for="voornaam">Voornaam:</label>
        <input type="text" id="voornaam" name="voornaam" placeholder="Je voornaam" autofocus required><br><br>

        <label for="achternaam">Achternaam:</label>
        <input type="text" id="achternaam" name="achternaam" placeholder="Je achternaam" required><br><br>
    </div>

    <div class="sporten">
        <p>Sporten</p>
        <p>Welke sport train je?</p>

        <input type="checkbox" id="hardlopen" name="sporten[]" value="Hardlopen">
        <label for="hardlopen">Hardlopen</label>

        <input type="checkbox" id="zwemmen" name="sporten[]" value="Zwemmen">
        <label for="zwemmen">Zwemmen</label>

        <input type="checkbox" id="roeien" name="sporten[]" value="Roeien">
        <label for="roeien">Roeien</label><br><br>
    </div>

    <div class="geslacht">
        <p>Geslacht</p>
        <p>Wat is je geslacht?</p>

        <input type="radio" id="man" name="geslacht" value="Man">
        <label for="man">Man</label>

        <input type="radio" id="vrouw" name="geslacht" value="Vrouw">
        <label for="vrouw">Vrouw</label><br><br>
    </div>

    <div class="favorieten">
        <p>Favorieten</p>

        <label for="favoriete_film">Favoriete film:</label>
        <input type="text" id="favoriete_film" name="favoriete_film"><br><br>

        <label for="favoriete_quote">Favoriete quote:</label>
        <input type="text" id="favoriete_quote" name="favoriete_quote" placeholder="Schrijf je favoriete quote"><br><br>

        <label for="wachtwoord">Wachtwoord:</label>
        <input type="password" id="wachtwoord" name="wachtwoord" required><br><br>

        <label for="favoriet_eten">Favoriet eten:</label>
        <select id="favoriet_eten" name="favoriet_eten">
            <option value="hamburger">Hamburger</option>
            <option value="pizza">Pizza</option>
            <option value="sushi">Sushi</option>
        </select><br><br>
    </div>

    <div class="beveiliging_contact">
        <p>Beveiliging & Contact</p>

        <label for="email">E-mailadres:</label>
        <input type="email" id="email" name="email" placeholder="Voer je e-mailadres in"><br><br>

        <label for="favoriete_site">Favoriete website:</label>
        <input type="url" id="favoriete_site" name="favoriete_site" placeholder="Voer de URL van je favoriete site in"><br><br>
    </div>

    <div class="extra_informatie">
        <p>Aanvullende informatie</p>

        <label for="favoriet_getal1">Favoriet getal tussen 1-10:</label>
        <input type="number" id="favoriet_getal1" name="favoriet_getal1" min="1" max="10"><br><br>

        <label for="favoriet_getal2">Favoriet getal tussen 11-1000:</label>
        <input type="range" id="favoriet_getal2" name="favoriet_getal2" min="11" max="1000"><br><br>

        <label for="geboortedatum">Wanneer ben je geboren?</label>
        <input type="date" id="geboortedatum" name="geboortedatum"><br><br>

        <label for="postcode">Belgische postcode:</label>
        <input type="text" id="postcode" name="postcode"
               placeholder="Voer je postcode in"
               pattern="^(100[0-9]|10[1-9][0-9]|1[1-9][0-9]{2}|[2-9][0-9]{2}[0-2]|999[0-2])$"
               required><br><br>
    </div>

    <div class="overig">
        <p>Overig</p>

        <label for="zoeken">Zoek naar iets:</label>
        <input type="search" id="zoeken" name="zoeken"><br><br>

        <label for="kleur">Wat is je favoriete kleur?</label>
        <input type="color" id="kleur" name="kleur"><br><br>

        <label for="bestand_upload">Bestand kiezen:</label>
        <input type="file" id="bestand_upload" name="bestand_upload"><br><br>
    </div>

    <input type="submit" value="Verzenden">

</form>

<script src="scripts/invulformulier.js"></script>

</body>
</html>
